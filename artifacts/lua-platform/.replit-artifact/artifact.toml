kind = "web"
previewPath = "/"
title = "Lua Script Platform"
version = "1.0.0"
id = "artifacts/lua-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21394

[services.development]
run = "pnpm --filter @workspace/lua-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lua-platform", "run", "build" ]
publicDir = "artifacts/lua-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21394"
BASE_PATH = "/"
